# ════════════════════════════════════════════════════════════════════
#  Snake Animation Generator
#  Generates an SVG animation of a snake eating Ahmed's contribution grid.
#  Runs daily at midnight UTC, on every push to main, and on-demand.
#  Output is pushed to the `output` branch and embedded in README.md.
# ════════════════════════════════════════════════════════════════════

name: Generate Snake

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

  # Re-run when README changes
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generate the snake SVGs (light + dark mode)
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: to7vx
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Push the generated SVGs to the `output` branch
      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
